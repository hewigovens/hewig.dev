<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" font-family="Georgia, 'Times New Roman', Times, serif">
  <rect width="1600" height="900" fill="#EFEEE9"/>

  <!-- title -->
  <g fill="#1A1A18" font-size="60">
    <text x="100" y="150">Don't fix the code.</text>
    <text x="100" y="222">Fix the process that generates the code.</text>
  </g>

  <!-- cards -->
  <g fill="#FBFBF9" stroke="#DEDDD6" stroke-width="2">
