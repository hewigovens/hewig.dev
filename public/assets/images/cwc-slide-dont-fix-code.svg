  <!-- card text -->
  <g fill="#1A1A18" font-size="31" text-anchor="middle">
    <text x="320" y="556">Sample some</text>
    <text x="320" y="599">of the results</text>

    <text x="800" y="534">Edit prompts to</text>
    <text x="800" y="577">handle things that</text>
