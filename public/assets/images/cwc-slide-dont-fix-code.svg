    <rect x="580" y="300" width="440" height="440" rx="20"/>
    <rect x="1060" y="300" width="440" height="440" rx="20"/>
  </g>

  <!-- icons (Lucide, 24x24, scaled 2.333 -> 56px, centered at card x / y=430) -->
  <!-- card 1: list-tree -->
  <g transform="translate(292,402) scale(2.333)" fill="none" stroke="#2A2A2A" stroke-width="0.95" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 12h-8"/>
    <path d="M21 6H8"/>
    <path d="M21 18h-8"/>
    <path d="M3 6v4c0 1.1.9 2 2 2h3"/>
    <path d="M3 10v6c0 1.1.9 2 2 2h3"/>
  </g>
  <!-- card 2: square-pen -->
  <g transform="translate(772,402) scale(2.333)" fill="none" stroke="#2A2A2A" stroke-width="0.95" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
    <path d="M18.375 2.625a1 1 0 0 1 3 3l-9.013 9.014a2 2 0 0 1-.853.505l-2.873.84a.5.5 0 0 1-.62-.62l.84-2.873a2 2 0 0 1 .505-.852z"/>
